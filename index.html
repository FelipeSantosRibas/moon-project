<!DOCTYPE html>
<html>
<head>
  <title>Moon Terrain</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
  <link rel="stylesheet" href="style.css">

</head>
<body>

<div id="minimap-container">

  <img
    id="minimap"
    src="./textures/moon-8k.jpg"
  >

  <div id="viewport"></div>

</div>

<div id="top-ui">

  <h1>MoonMaps</h1>

  <p>Visualização de relevo da Lua</p>

</div>


<div id="controls-ui">

  <h2>Controles</h2>

  <p>Setas: Mover pela Lua</p>

  <p>Segurar clique esquerdo: girar câmera</p>

  <p>Scroll: afastar/aproximar da lua</p>

</div>


<div id="chunk-ui">

  <h2>Chunks</h2>

  <button onclick="changeChunkSize(128)">
    Pequeno
  </button>

  <button onclick="changeChunkSize(256)">
    Médio
  </button>

  <button onclick="changeChunkSize(512)">
    Grande
  </button>

</div>

</body>
<script type="module" src="main.js"></script>
</html>
